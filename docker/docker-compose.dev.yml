version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: medicare_db_dev
    environment:
      POSTGRES_DB: medicare_db
      POSTGRES_USER: medicare_user
      POSTGRES_PASSWORD: medicare_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - medicare_network_dev

  backend:
    build: ../backend
    container_name: medicare_backend_dev
    ports:
      - "3001:3001"
      - "9229:9229"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medicare_db
      DB_USER: medicare_user
      DB_PASSWORD: medicare_password
    depends_on:
      - postgres
    volumes:
      - ../backend:/app
      - /app/node_modules
    networks:
      - medicare_network_dev
    command: npm run dev

  frontend:
    build: ../frontend
    container_name: medicare_frontend_dev
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - medicare_network_dev

networks:
  medicare_network_dev:
    driver: bridge

volumes:
  postgres_data_dev:
